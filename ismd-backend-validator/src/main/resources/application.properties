spring.application.name=ismd-backend-validator

# Validation rules configuration
# Keys must match sanitized filenames (lowercase, no .ttl extension)

# === LOCAL RULES ===
# ERRORS
validation.rules.enabled.local-název-slovníku=true
validation.rules.enabled.local-název-pojmu=true
validation.rules.enabled.local-duplikátní-iri-pojmů=true
validation.rules.enabled.local-duplikátní-název-pojmů=true
validation.rules.enabled.local-charakteristika-hodnota-číselník=true
validation.rules.enabled.local-charakteristika-hodnota-typ=true
validation.rules.enabled.local-charakteristika-hodnota-regex=true

# WARNINGS
validation.rules.enabled.local-popis-slovníku=true
validation.rules.enabled.local-zdroj-pojmu=true
validation.rules.enabled.local-definice-bez-zdroje=true
validation.rules.enabled.local-zdroj-ani-související-zdroj=true
validation.rules.enabled.local-osamocené-pojmy=true
validation.rules.enabled.local-alternativní-název-stejný=true
validation.rules.enabled.local-typ-pojmu=true

# INFO
validation.rules.enabled.local-charakteristiky-rpp-pojmu=true

# DISABLED (not in requirements)
validation.rules.enabled.local-povinné-údaje-pojmu=false
validation.rules.enabled.local-popis-pojmu=false

# === GLOBAL RULES ===
# ERRORS
validation.rules.enabled.global-slovník-s-jiným-iri-stejným-názvem=true
validation.rules.enabled.global-slovník-se-stejným-iri-jiným-názvem=true
validation.rules.enabled.global-pojem-se-stejným-iri-jiným-názvem=true

# INFO
validation.rules.enabled.global-pojem-se-stejným-iri=true
validation.rules.enabled.global-slovník-se-stejným-iri=true

# DISABLED (not in requirements)
validation.rules.enabled.global-pojem-s-jiným-iri-stejným-názvem=false
# Directory containing SHACL rule files
validation.rules.rules-directory=classpath:validation/rules/
# Default validation timing
validation.rules.default-timing=before_export
# Validation execution settings
validation.rules.timeout-ms=10000
validation.rules.cache-results=true
validation.rules.continue-on-rule-error=true
# Ontology containing VIOLATION download settings
validation.rules.enable-ontology-violation-download=false

# Global validation configuration
validation.global.sparql-endpoint=
validation.global.timeout-ms=10000
validation.global.max-attempts=3
validation.global.retry-delay-ms=1000

# Concept filtering configuration
# Enable/disable concept filtering (default: false)
concept.filter.enabled=false
# Filter regex for concepts - Unicode (only used if enabled=true)
concept.filter.regex=https:\/\/slovn\u00EDk\.gov\.cz\/neimportovat.*


# Context Path Configuration
# Base path for the application to support multi-app hosting on the same domain
# Can be overridden by env var SERVER_SERVLET_CONTEXT_PATH
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/validujeme}

# Springdoc/Swagger Configuration
# Paths are relative to the context-path
# Swagger UI will be at: ${server.servlet.context-path}/swagger-ui.html
# OpenAPI spec will be at: ${server.servlet.context-path}/v3/api-docs

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
