name: Reusable Test Workflow
permissions:
  contents: read
  packages: read

on:
  workflow_call:
    inputs:
      enforce_coverage:
        description: "Fail workflow when JaCoCo check is not met"
        required: false
        type: boolean
        default: true
      coverage_minimum:
        description: "JaCoCo line coverage minimum ratio (0.00-1.00)"
        required: false
        type: string
        default: "0.00"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', 'ismd-validator-common/src/**') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install common library locally
        working-directory: ismd-backend-validator
        run: ./mvnw -f ../ismd-validator-common/pom.xml -DskipTests install

      - name: Run tests with coverage
        working-directory: ismd-backend-validator
        run: |
          if [ "${{ inputs.enforce_coverage }}" = "true" ]; then
            ./mvnw clean verify -Djacoco.line.minimum=${{ inputs.coverage_minimum }}
          else
            ./mvnw clean test jacoco:report -Djacoco.line.minimum=${{ inputs.coverage_minimum }}
          fi

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-jacoco-report-${{ github.run_id }}
          path: ismd-backend-validator/target/site/jacoco
          if-no-files-found: warn
