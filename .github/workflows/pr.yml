name: PR Workflow

on:
  pull_request:
    paths:
      - '**'
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  run-tests:
    uses: ./.github/workflows/reusable-test.yml
    with:
      coverage_minimum: ${{ vars.JACOCO_LINE_MINIMUM != '' && vars.JACOCO_LINE_MINIMUM || '0.00' }}
    secrets: inherit
